<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBFLOW | 3D Interactive Agency</title>
    <style>
        :root {
            --bg: #030303;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        .wrapper { perspective: 1000px; padding: 100px 5%; }

        /* Hero Section */
        .hero { text-align: center; margin-bottom: 150px; }
        .hero h1 { font-size: clamp(4rem, 12vw, 10rem); font-weight: 800; text-transform: uppercase; letter-spacing: -5px; line-height: 0.9; }

        /* 3D Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; transform-style: preserve-3d; }

        /* 3D Card */
        .card {
            background: var(--card-bg);
            padding: 60px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            transition: transform 0.1s ease-out, box-shadow 0.3s;
            cursor: pointer;
            transform-style: preserve-3d;
        }
        .card:hover { box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .card h2 { font-size: 2.5rem; margin-bottom: 20px; transform: translateZ(20px); }
        .card p { color: #aaa; transform: translateZ(10px); }

        /* Contact Section */
        .contact { text-align: center; margin-top: 200px; padding: 100px 0; border-top: 1px solid #222; }
        .email { font-size: clamp(2rem, 5vw, 4rem); font-weight: 800; color: #fff; text-decoration: none; }
        
        .mouse-cursor { position: fixed; width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%; pointer-events: none; z-index: 999; transition: transform 0.1s; }
    </style>
</head>
<body>

    <div class="mouse-cursor" id="cursor"></div>

    <div class="wrapper">
        <section class="hero">
            <h1>WEBFLOW<br>AGENCY.</h1>
        </section>

        <div class="grid">
            <div class="card" data-tilt>
                <h2>01. 3D Design</h2>
                <p>İmmersiv və dərinlik hissi verən interfeyslər.</p>
            </div>
            <div class="card" data-tilt>
                <h2>02. Development</h2>
                <p>Müasir texnologiyalarla sürətli kodlaşdırma.</p>
            </div>
            <div class="card" data-tilt>
                <h2>03. Brand Strategy</h2>
                <p>Rəqəmsal dünyada unudulmaz imic.</p>
            </div>
        </div>

        <section class="contact">
            <p style="margin-bottom: 20px; color: #666;">LAYİHƏNİZİ BİZİMLƏ HƏYATA KEÇİRİN</p>
            <a href="mailto:samsgoog28@gmail.com" class="email">samsgoog28@gmail.com</a>
            <div style="margin-top: 30px; font-size: 1.5rem;">Instagram: @webflow.0</div>
        </section>
    </div>

    <script>
        // 3D Tilt Effect
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                card.style.transform = `perspective(1000px) rotateY(${x / 10}deg) rotateX(${-y / 10}deg) translateZ(10px)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg) translateZ(0px)`;
            });
        });

        // Custom Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
        });
    </script>
</body>
</html>
